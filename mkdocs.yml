site_name: Homelab
site_url: https://gabinsmd.github.io/homelab-doc/
site_description: Documentation du homelab
site_author: GabinSMD

repo_url: https://github.com/GabinSMD/homelab-doc
repo_name: GabinSMD/homelab-doc
edit_uri: edit/main/docs/

theme:
  name: material
  language: fr
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Mode sombre
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Mode clair
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang: fr
  - mermaid2

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid_custom
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.mark
  - pymdownx.keys
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Accueil: index.md
  - Infrastructure:
    - Hardware: infrastructure/hardware.md
    - Optimisations OS: infrastructure/os-optimizations.md
    - Monitoring: infrastructure/monitoring.md
  - Services:
    - Stack Docker: services/docker-stack.md
    - Traefik: services/traefik.md
    - AdGuard Home: services/adguard.md
  - Reseau:
    - Architecture cible: network/architecture-cible.md
    - VLANs: network/vlans.md
  - Roadmap: roadmap.md
