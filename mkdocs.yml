site_name: Homelab
site_url: https://homelab.gabin-simond.fr/
site_description: Documentation du homelab
site_author: GabinSMD

repo_url: https://github.com/GabinSMD/homelab-doc
repo_name: GabinSMD/homelab-doc
edit_uri: edit/main/docs/

theme:
  name: material
  language: fr
  custom_dir: overrides
  font: false
  palette:
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Mode clair
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Mode sombre
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
    - toc.follow
  icon:
    repo: fontawesome/brands/github
  logo: assets/logo.svg
  favicon: assets/logo.svg

extra_css:
  - stylesheets/extra.css

plugins:
  - search:
      lang: fr
  - mermaid2

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid_custom
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.mark
  - pymdownx.keys
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Accueil: index.md
  - Architecture:
    - architecture/index.md
    - Machines: architecture/hardware.md
    - Optimisations OS: architecture/os.md
    - Reseau actuel: architecture/reseau.md
    - Reseau cible: architecture/reseau-cible.md
    - Cluster qdevice: architecture/cluster-qdevice.md
    - Fish observability: architecture/fish-observability.md
  - Services:
    - Vue d'ensemble: services/index.md
    - Traefik: services/traefik.md
    - Authelia (SSO): services/authelia.md
    - AdGuard Home: services/adguard.md
    - Vaultwarden: services/vaultwarden.md
    - Grafana (logs): services/grafana.md
    - Alloy + Loki HA: services/alloy-loki-ha.md
  - Securite:
    - securite/index.md
    - Politique: securite/politique.md
    - Comptes et service accounts: securite/comptes.md
    - Hardening: securite/hardening.md
    - Roadmap: securite/roadmap.md
    - YubiKey age setup: securite/yubikey-age-setup.md
    - Egress phase 2 plan: securite/egress-phase2-plan.md
  - Operations:
    - operations/index.md
    - Monitoring: operations/monitoring.md
    - Notif hygiene: operations/notif-hygiene.md
    - Backups: operations/backups.md
    - Break-glass: operations/break-glass.md
    - Depannage: operations/depannage.md
    - DR drill scenario 1: operations/dr-drill-scenario-1.md
  - Guides:
    - guides/index.md
    - Ajouter un service: guides/ajouter-service.md
    - Proxmox sur ZimaBoard: guides/proxmox-zimaboard.md
    - TLS et certificats: guides/tls.md
  - Projet:
    - projet/index.md
    - Decisions techniques: projet/decisions.md
    - Roadmap (4 phases hardware): projet/roadmap.md
    - Roadmap consolidee 2026-05: projet/roadmap-2026-05.md
    - fish (SRE perso): projet/fish.md
    - Spec fiabilisation drill restauration: projet/2026-06-11-fiabilisation-drill-restauration.md
    - A propos: projet/about.md
