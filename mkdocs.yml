site_name: Homelab
site_url: https://homelab.gabin-simond.fr/
site_description: Documentation du homelab
site_author: GabinSMD

repo_url: https://github.com/GabinSMD/homelab-doc
repo_name: GabinSMD/homelab-doc
edit_uri: edit/main/docs/

theme:
  name: material
  language: fr
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Mode sombre
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Mode clair
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang: fr
  - mermaid2

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid_custom
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.mark
  - pymdownx.keys
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Accueil: index.md
  - Infrastructure:
    - Hardware: infrastructure/hardware.md
    - Optimisations OS: infrastructure/os-optimizations.md
    - Securite: infrastructure/security.md
    - Hardening: infrastructure/hardening.md
    - Roadmap securite: infrastructure/security-roadmap.md
    - Break-glass: infrastructure/break-glass.md
    - Monitoring: infrastructure/monitoring.md
    - Backups: infrastructure/backups.md
    - Maintenance: infrastructure/maintenance.md
    - Troubleshooting: infrastructure/troubleshooting.md
  - Services:
    - Naming: services/naming.md
    - Stack Docker: services/docker-stack.md
    - Traefik: services/traefik.md
    - AdGuard Home: services/adguard.md
    - Authelia (SSO): services/authelia.md
    - Vaultwarden: services/vaultwarden.md
    - Acces et URLs: services/acces.md
  - Reseau:
    - Architecture cible: network/architecture-cible.md
    - VLANs: network/vlans.md
  - Guides:
    - Ajouter un service: guides/ajouter-service.md
    - Proxmox sur ZimaBoard: guides/proxmox-zimaboard.md
    - Comment fonctionne le DNS: guides/dns-flow.md
    - TLS et certificats: guides/tls.md
  - Decisions techniques: decisions.md
  - Roadmap: roadmap.md
  - A propos: about.md
